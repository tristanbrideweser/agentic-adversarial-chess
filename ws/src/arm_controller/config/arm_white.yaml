/**:
  ros__parameters:

    # -----------------------------------------------------------------------
    # White arm (Panda at y=-0.45) pick-and-place parameters
    # -----------------------------------------------------------------------

    # Z offsets for each motion phase (metres)
    approach_z_offset:  0.10
    lift_z_offset:      0.10
    transit_z_offset:   0.10
    retract_z_offset:   0.10

    # Grasp retry limit
    max_retries: 3

    # MoveIt planning timeout per waypoint
    planning_time_sec: 5.0

    # Velocity scaling: 1.0 = full speed, 0.0 = stationary
    vel_transit:    0.7     # free-space transit between squares
    vel_near_piece: 0.2     # descend / lower / retract phases (near pieces)
    vel_approach:   0.3     # initial approach from home
    vel_home:       0.5     # return-to-home motion

    # Acceleration scaling
    accel_transit:    0.5
    accel_near_piece: 0.2
    accel_approach:   0.3
    accel_home:       0.4

    # Use Cartesian path interpolation for descent/lower phases.
    # Set false to use joint-space planning (faster but less predictable path).
    use_cartesian_descent: true

    # MoveIt planning parameters
    planning_pipeline:       "ompl"
    planner_id:              "RRTConnectkConfigDefault"
    num_planning_attempts:   3
    max_velocity_scaling:    0.5
    max_acceleration_scaling: 0.5
    goal_position_tolerance:   0.001   # metres
    goal_orientation_tolerance: 0.01   # radians
    cartesian_step_size:     0.005     # metres
    cartesian_jump_threshold: 0.0      # 0 = disabled

    # Gripper parameters (Franka Hand)
    gripper_open_width_m:      0.07
    gripper_grasp_speed_mps:   0.05
    gripper_grasp_force_n:     20.0
    gripper_epsilon_inner:     0.005
    gripper_epsilon_outer:     0.005
    gripper_safe_min_width_m:  0.010