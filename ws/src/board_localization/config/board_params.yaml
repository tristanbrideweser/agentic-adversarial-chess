/**:
  ros__parameters:

    # -----------------------------------------------------------------------
    # Board pose in the world frame
    # In Gazebo, the board is fixed at the nominal pose — leave these at
    # their defaults.  For physical deployment, set these from the output
    # of the calibration routine (calibration.py).
    # -----------------------------------------------------------------------
    board_origin_x:  0.0       # world X of the board centre (m)
    board_origin_y:  0.0       # world Y of the board centre (m)
    board_origin_z:  0.762     # world Z of the board surface (m)
    board_yaw:       0.0       # rotation around world Z (radians)

    # -----------------------------------------------------------------------
    # Board geometry constants
    # These must match the physical board and the move_translator/grasp_planner
    # packages.  Do not change without updating all packages.
    # -----------------------------------------------------------------------
    square_size:     0.05      # edge length of one square (m)
    a1_x:           -0.196875     # world X of a1 square centre at nominal pose (m)
    a1_y:           -0.196875     # world Y of a1 square centre at nominal pose (m)

    # -----------------------------------------------------------------------
    # Arm base positions (world frame) — for reach validation and diagnostics
    # -----------------------------------------------------------------------
    white_arm_base: [0.0, -0.45, 0.75]
    black_arm_base: [0.0,  0.45, 0.75]

    # -----------------------------------------------------------------------
    # Camera position (world frame)
    # -----------------------------------------------------------------------
    camera_position: [0.0, 0.0, 1.80]

    # -----------------------------------------------------------------------
    # Graveyard slot layout
    # -----------------------------------------------------------------------
    graveyard_white_x:   -0.275   # X of white-capture graveyard column (m)
    graveyard_black_x:    0.275   # X of black-capture graveyard column (m)
    graveyard_start_y:   -0.175   # Y of first slot (aligned with rank 1)
    graveyard_spacing:    0.050   # inter-slot spacing (m)

    # -----------------------------------------------------------------------
    # Square lookup service settings
    # -----------------------------------------------------------------------
    use_tf_lookup:     false    # true = use TF buffer; false = analytic math
    tf_timeout_sec:    0.5      # TF lookup timeout (seconds)
    world_frame:       "world"  # target frame for all pose lookups

    # -----------------------------------------------------------------------
    # TF broadcaster settings
    # -----------------------------------------------------------------------
    publish_rate_hz:   1.0      # rate at which static transforms are re-broadcast
                                # (0 = publish once only)