# Per-player Stockfish configuration.
# Override at launch with e.g.
#   ros2 run chess_engine stockfish_node --ros-args -p color:=white -p skill_level:=15

stockfish_white:
  ros__parameters:
    color: white
    skill_level: 10
    time_limit: 1.0
    stockfish_path: /usr/bin/stockfish

stockfish_black:
  ros__parameters:
    color: black
    skill_level: 10
    time_limit: 1.0
    stockfish_path: /usr/bin/stockfish
